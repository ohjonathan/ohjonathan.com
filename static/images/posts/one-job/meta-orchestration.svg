<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 240" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif">
  <style>
    .step-box { fill: none; stroke: #1B2A4A; stroke-width: 1.5; rx: 8; }
    .hub-box { fill: rgba(27, 42, 74, 0.06); stroke: #1B2A4A; stroke-width: 2; rx: 8; }
    .step-title { font-size: 14px; font-weight: 600; fill: #1A1A1A; }
    .step-desc { font-size: 11.5px; fill: #5C5C5C; }
    .spoke { stroke: #1B2A4A; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .spoke-back { stroke: #8A8A8A; stroke-width: 1; stroke-dasharray: 6 4; fill: none; marker-end: url(#arrowGray); }
    .arrow-path { fill: none; stroke: #1B2A4A; stroke-width: 1.2; }
    .spoke-back-path { fill: none; stroke: #8A8A8A; stroke-width: 1; }
    .header { font-size: 10px; font-weight: 500; fill: #8A8A8A; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    .annotation { font-size: 10.5px; fill: #8A8A8A; font-style: italic; }
    [data-theme="terminal"] .step-box { stroke: #3CEC6A; }
    [data-theme="terminal"] .hub-box { fill: rgba(60, 236, 106, 0.08); stroke: #3CEC6A; }
    [data-theme="terminal"] .step-title { fill: #D4E4D4; }
    [data-theme="terminal"] .step-desc { fill: #8FA88F; }
    [data-theme="terminal"] .spoke { stroke: #3CEC6A; }
    [data-theme="terminal"] .spoke-back { stroke: #5A7A5A; }
    [data-theme="terminal"] .arrow-path { stroke: #3CEC6A; }
    [data-theme="terminal"] .spoke-back-path { stroke: #5A7A5A; }
    [data-theme="terminal"] .header { fill: #5A7A5A; }
    [data-theme="terminal"] .annotation { fill: #5A7A5A; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" class="arrow-path"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" class="spoke-back-path"/>
    </marker>
  </defs>

  <text x="290" y="22" text-anchor="middle" class="header">ESSAY ORCHESTRATION</text>

  <!-- Hub: Johnny -->
  <rect x="230" y="72" width="120" height="60" class="hub-box" rx="8"/>
  <text x="290" y="100" text-anchor="middle" class="step-title">Johnny</text>
  <text x="290" y="118" text-anchor="middle" class="step-desc">routes all outputs</text>

  <!-- Spoke 1: Codebase Session (left) -->
  <rect x="20" y="52" width="150" height="80" class="step-box" rx="8"/>
  <text x="95" y="78" text-anchor="middle" class="step-title">Codebase</text>
  <text x="95" y="96" text-anchor="middle" class="step-desc">23 repos scanned</text>
  <text x="95" y="112" text-anchor="middle" class="step-desc">storyline options</text>

  <!-- Spoke 2: Narrative Session (right) -->
  <rect x="410" y="52" width="150" height="80" class="step-box" rx="8"/>
  <text x="485" y="78" text-anchor="middle" class="step-title">Narrative</text>
  <text x="485" y="96" text-anchor="middle" class="step-desc">master narrative</text>
  <text x="485" y="112" text-anchor="middle" class="step-desc">structural drafts</text>

  <!-- Spoke 3: Voice Session (bottom center) -->
  <rect x="215" y="162" width="150" height="60" class="step-box" rx="8"/>
  <text x="290" y="186" text-anchor="middle" class="step-title">Voice</text>
  <text x="290" y="204" text-anchor="middle" class="step-desc">argument + final prose</text>

  <!-- Spokes: Johnny → sessions (solid) -->
  <line x1="230" y1="95" x2="172" y2="92" class="spoke"/>
  <line x1="350" y1="95" x2="408" y2="92" class="spoke"/>
  <line x1="290" y1="132" x2="290" y2="160" class="spoke"/>

  <!-- Spokes back: sessions → Johnny (dashed) -->
  <line x1="170" y1="82" x2="228" y2="85" class="spoke-back"/>
  <line x1="410" y1="82" x2="352" y2="85" class="spoke-back"/>
  <line x1="280" y1="162" x2="280" y2="134" class="spoke-back"/>
</svg>
