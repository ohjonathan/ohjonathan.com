<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif">
  <style>
    .step-box { fill: none; stroke: #1B2A4A; stroke-width: 1.5; rx: 8; }
    .step-num { font-size: 13px; font-weight: 600; fill: #fff; }
    .step-num-bg { fill: #1B2A4A; }
    .step-title { font-size: 15px; font-weight: 600; fill: #1A1A1A; }
    .step-desc { font-size: 12.5px; fill: #5C5C5C; }
    .arrow { stroke: #1B2A4A; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-path { fill: none; stroke: #1B2A4A; stroke-width: 1.2; }
    .feedback { stroke: #8A8A8A; stroke-width: 1; stroke-dasharray: 6 4; fill: none; marker-end: url(#arrowGray); }
    .feedback-path { fill: none; stroke: #8A8A8A; stroke-width: 1; }
    .feedback-label { font-size: 11px; fill: #8A8A8A; font-style: italic; }
    .header { font-size: 11px; font-weight: 500; fill: #8A8A8A; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    .model-label { font-size: 11.5px; font-weight: 600; fill: #1A1A1A; }
    [data-theme="terminal"] .step-box { stroke: #3CEC6A; }
    [data-theme="terminal"] .step-num-bg { fill: #3CEC6A; }
    [data-theme="terminal"] .step-num { fill: #0A0A0A; }
    [data-theme="terminal"] .step-title { fill: #D4E4D4; }
    [data-theme="terminal"] .step-desc { fill: #8FA88F; }
    [data-theme="terminal"] .arrow { stroke: #3CEC6A; }
    [data-theme="terminal"] .arrow-path { stroke: #3CEC6A; }
    [data-theme="terminal"] .feedback { stroke: #5A7A5A; }
    [data-theme="terminal"] .feedback-path { stroke: #5A7A5A; }
    [data-theme="terminal"] .feedback-label { fill: #5A7A5A; }
    [data-theme="terminal"] .header { fill: #5A7A5A; }
    [data-theme="terminal"] .model-label { fill: #D4E4D4; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" class="arrow-path"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" class="feedback-path"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="390" y="24" text-anchor="middle" class="header">MULTI-MODEL RESEARCH PIPELINE</text>

  <!-- Step 1: Research Prompts -->
  <rect x="14" y="120" width="100" height="60" class="step-box" rx="8"/>
  <circle cx="30" cy="120" r="10" class="step-num-bg"/>
  <text x="30" y="124" text-anchor="middle" class="step-num">1</text>
  <text x="64" y="148" text-anchor="middle" class="step-title" font-size="13">Research</text>
  <text x="64" y="164" text-anchor="middle" class="step-title" font-size="13">Prompts</text>

  <!-- Arrow: Step 1 -> 3 parallel models -->
  <!-- Fan-out lines from step 1 box to each model -->
  <line x1="114" y1="150" x2="148" y2="150" class="arrow" style="marker-end: none;"/>
  <!-- Vertical spine -->
  <line x1="148" y1="78" x2="148" y2="222" class="arrow" style="marker-end: none;"/>
  <!-- Branch to Claude -->
  <line x1="148" y1="78" x2="170" y2="78" class="arrow"/>
  <!-- Branch to ChatGPT -->
  <line x1="148" y1="150" x2="170" y2="150" class="arrow"/>
  <!-- Branch to Gemini -->
  <line x1="148" y1="222" x2="170" y2="222" class="arrow"/>

  <!-- Step 2: Three parallel models -->
  <!-- Claude -->
  <rect x="170" y="50" width="110" height="56" class="step-box" rx="8"/>
  <circle cx="186" cy="50" r="10" class="step-num-bg"/>
  <text x="186" y="54" text-anchor="middle" class="step-num">2</text>
  <text x="225" y="76" text-anchor="middle" class="model-label">Claude</text>
  <text x="225" y="92" text-anchor="middle" class="step-desc">independent analysis</text>

  <!-- ChatGPT -->
  <rect x="170" y="122" width="110" height="56" class="step-box" rx="8"/>
  <circle cx="186" cy="122" r="10" class="step-num-bg"/>
  <text x="186" y="126" text-anchor="middle" class="step-num">2</text>
  <text x="225" y="148" text-anchor="middle" class="model-label">ChatGPT</text>
  <text x="225" y="164" text-anchor="middle" class="step-desc">independent analysis</text>

  <!-- Gemini -->
  <rect x="170" y="194" width="110" height="56" class="step-box" rx="8"/>
  <circle cx="186" cy="194" r="10" class="step-num-bg"/>
  <text x="186" y="198" text-anchor="middle" class="step-num">2</text>
  <text x="225" y="220" text-anchor="middle" class="model-label">Gemini</text>
  <text x="225" y="236" text-anchor="middle" class="step-desc">independent analysis</text>

  <!-- Arrows: 3 models -> Extraction Bot (converge) -->
  <line x1="280" y1="78" x2="312" y2="78" class="arrow" style="marker-end: none;"/>
  <line x1="280" y1="150" x2="312" y2="150" class="arrow" style="marker-end: none;"/>
  <line x1="280" y1="222" x2="312" y2="222" class="arrow" style="marker-end: none;"/>
  <!-- Vertical convergence spine -->
  <line x1="312" y1="78" x2="312" y2="222" class="arrow" style="marker-end: none;"/>
  <!-- Single line into extraction bot -->
  <line x1="312" y1="150" x2="340" y2="150" class="arrow"/>

  <!-- Step 3: Extraction Bot -->
  <rect x="340" y="120" width="100" height="60" class="step-box" rx="8"/>
  <circle cx="356" cy="120" r="10" class="step-num-bg"/>
  <text x="356" y="124" text-anchor="middle" class="step-num">3</text>
  <text x="390" y="148" text-anchor="middle" class="step-title" font-size="13">Extraction</text>
  <text x="390" y="164" text-anchor="middle" class="step-title" font-size="13">Bot</text>

  <!-- Arrow: Step 3 -> Step 4 -->
  <line x1="440" y1="150" x2="468" y2="150" class="arrow"/>

  <!-- Step 4: Divergence Analysis -->
  <rect x="468" y="120" width="100" height="60" class="step-box" rx="8"/>
  <circle cx="484" cy="120" r="10" class="step-num-bg"/>
  <text x="484" y="124" text-anchor="middle" class="step-num">4</text>
  <text x="518" y="148" text-anchor="middle" class="step-title" font-size="13">Divergence</text>
  <text x="518" y="164" text-anchor="middle" class="step-title" font-size="13">Analysis</text>

  <!-- Arrow: Step 4 -> Step 5 -->
  <line x1="568" y1="150" x2="596" y2="150" class="arrow"/>

  <!-- Step 5: Structured Debate -->
  <rect x="596" y="120" width="100" height="60" class="step-box" rx="8"/>
  <circle cx="612" cy="120" r="10" class="step-num-bg"/>
  <text x="612" y="124" text-anchor="middle" class="step-num">5</text>
  <text x="646" y="148" text-anchor="middle" class="step-title" font-size="13">Structured</text>
  <text x="646" y="164" text-anchor="middle" class="step-title" font-size="13">Debate</text>

  <!-- Dashed feedback loop: Step 5 -> back to models -->
  <path d="M 646 180 L 646 290 L 225 290 L 225 250" class="feedback"/>
  <text x="435" y="284" text-anchor="middle" class="feedback-label">feedback loop</text>

  <!-- Arrow: Step 5 -> Step 6 -->
  <line x1="696" y1="150" x2="714" y2="150" class="arrow"/>

  <!-- Step 6: Final Selection -->
  <rect x="714" y="112" width="56" height="76" class="step-box" rx="8"/>
  <circle cx="730" cy="112" r="10" class="step-num-bg"/>
  <text x="730" y="116" text-anchor="middle" class="step-num">6</text>
  <text x="742" y="145" text-anchor="middle" class="step-title" font-size="12">Final</text>
  <text x="742" y="160" text-anchor="middle" class="step-title" font-size="12">Selection</text>
  <text x="742" y="178" text-anchor="middle" class="step-desc" font-size="10">190+ cos.</text>
</svg>