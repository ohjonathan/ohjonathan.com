<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 240" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif">
  <style>
    .step-box { fill: none; stroke: #1B2A4A; stroke-width: 1.5; rx: 8; }
    .step-title { font-size: 14px; font-weight: 600; fill: #1A1A1A; }
    .step-desc { font-size: 11.5px; fill: #5C5C5C; }
    .arrow { stroke: #1B2A4A; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-path { fill: none; stroke: #1B2A4A; stroke-width: 1.2; }
    .header { font-size: 10px; font-weight: 500; fill: #8A8A8A; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    .annotation { font-size: 10.5px; fill: #8A8A8A; font-style: italic; }
    .stat { font-size: 10px; fill: #5C5C5C; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    [data-theme="terminal"] .step-box { stroke: #3CEC6A; }
    [data-theme="terminal"] .step-title { fill: #D4E4D4; }
    [data-theme="terminal"] .step-desc { fill: #8FA88F; }
    [data-theme="terminal"] .arrow { stroke: #3CEC6A; }
    [data-theme="terminal"] .arrow-path { stroke: #3CEC6A; }
    [data-theme="terminal"] .header { fill: #5A7A5A; }
    [data-theme="terminal"] .annotation { fill: #5A7A5A; }
    [data-theme="terminal"] .stat { fill: #8FA88F; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" class="arrow-path"/>
    </marker>
  </defs>

  <text x="290" y="22" text-anchor="middle" class="header">PROJECT ADA</text>

  <!-- Raw Data -->
  <rect x="10" y="55" width="100" height="70" class="step-box" rx="8"/>
  <text x="60" y="80" text-anchor="middle" class="step-title">Raw Data</text>
  <text x="60" y="98" text-anchor="middle" class="stat">1.57M records</text>
  <text x="60" y="114" text-anchor="middle" class="step-desc">3 source extracts</text>

  <!-- Fan out to two paths -->
  <line x1="110" y1="78" x2="138" y2="65" class="arrow"/>
  <line x1="110" y1="102" x2="138" y2="115" class="arrow"/>

  <!-- Deterministic Classifier -->
  <rect x="140" y="35" width="120" height="60" class="step-box" rx="8"/>
  <text x="200" y="58" text-anchor="middle" class="step-title">Rules Engine</text>
  <text x="200" y="76" text-anchor="middle" class="step-desc">keyword + pattern</text>
  <text x="200" y="90" text-anchor="middle" class="step-desc">matching</text>

  <!-- LLM Refinement -->
  <rect x="140" y="110" width="120" height="60" class="step-box" rx="8"/>
  <text x="200" y="132" text-anchor="middle" class="step-title">LLM Refinement</text>
  <text x="200" y="150" text-anchor="middle" class="step-desc">280 edge cases</text>
  <text x="200" y="164" text-anchor="middle" class="step-desc">human-reviewed</text>

  <!-- Converge -->
  <line x1="260" y1="65" x2="288" y2="90" class="arrow"/>
  <line x1="260" y1="140" x2="288" y2="110" class="arrow"/>

  <!-- Analysis Engine -->
  <rect x="290" y="65" width="110" height="70" class="step-box" rx="8"/>
  <text x="345" y="90" text-anchor="middle" class="step-title">Analysis</text>
  <text x="345" y="108" text-anchor="middle" class="stat">119 scripts</text>
  <text x="345" y="124" text-anchor="middle" class="step-desc">74 analysis + 27 pipe</text>

  <line x1="400" y1="100" x2="428" y2="100" class="arrow"/>

  <!-- Output -->
  <rect x="430" y="55" width="140" height="90" class="step-box" rx="8"/>
  <text x="500" y="80" text-anchor="middle" class="step-title">Output</text>
  <text x="500" y="100" text-anchor="middle" class="stat">114 dashboards</text>
  <text x="500" y="116" text-anchor="middle" class="stat">63 data packages</text>
  <text x="500" y="136" text-anchor="middle" class="step-desc">177 total artifacts</text>

  <!-- Bottom annotation -->
  <text x="290" y="210" text-anchor="middle" class="annotation">12 cursor rules · 282 commits in 13 days · deterministic first, LLM only where rules fail</text>
</svg>
