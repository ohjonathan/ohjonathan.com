<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif">
  <style>
    .badge-body { fill: #FAF8F5; stroke: #1B2A4A; stroke-width: 1.5; }
    .badge-header { fill: rgba(27, 42, 74, 0.08); }
    .badge-footer { fill: rgba(27, 42, 74, 0.04); }
    .badge-divider { stroke: #E8E4DF; stroke-width: 1; }
    .clip-fill { fill: #8A8A8A; }

    .brand-name { font-size: 12px; font-weight: 700; fill: #1A1A1A; letter-spacing: 0.22em; font-family: 'JetBrains Mono', 'SF Mono', monospace; text-transform: uppercase; }
    .agent-name-big { font-size: 30px; font-weight: 800; fill: #1A1A1A; letter-spacing: 0.01em; }
    .agent-role { font-size: 13px; fill: #5C5C5C; letter-spacing: 0.08em; font-family: 'JetBrains Mono', 'SF Mono', monospace; text-transform: uppercase; }
    .badge-status { font-size: 12px; fill: #5C5C5C; letter-spacing: 0.12em; font-family: 'JetBrains Mono', 'SF Mono', monospace; text-transform: uppercase; }

    .mini-tag-body { fill: #FAF8F5; stroke: #1B2A4A; stroke-width: 1.5; }
    .mini-tag-strip { fill: #D8232A; }
    .mini-tag-hello { font-size: 11px; font-weight: 800; fill: #FFFFFF; letter-spacing: 0.14em; font-family: 'DM Sans', Arial, sans-serif; }
    .mini-tag-name { font-size: 38px; font-weight: 800; fill: #1A1A1A; letter-spacing: 0.02em; }
    .mini-tag-shadow { fill: rgba(27, 42, 74, 0.22); }

    [data-theme="terminal"] .badge-body { fill: #0D1812; stroke: #3CEC6A; }
    [data-theme="terminal"] .badge-header { fill: rgba(60, 236, 106, 0.1); }
    [data-theme="terminal"] .badge-footer { fill: rgba(60, 236, 106, 0.05); }
    [data-theme="terminal"] .badge-divider { stroke: #1C2E24; }
    [data-theme="terminal"] .brand-name { fill: #D4E4D4; }
    [data-theme="terminal"] .agent-name-big { fill: #D4E4D4; }
    [data-theme="terminal"] .agent-role { fill: #8FA88F; }
    [data-theme="terminal"] .badge-status { fill: #8FA88F; }
    [data-theme="terminal"] .mini-tag-body { fill: #0D1812; stroke: #3CEC6A; }
    [data-theme="terminal"] .mini-tag-strip { fill: #E8382E; }
    [data-theme="terminal"] .mini-tag-name { fill: #D4E4D4; }
    [data-theme="terminal"] .mini-tag-shadow { fill: rgba(0, 0, 0, 0.5); }
  </style>

  <defs>
    <clipPath id="heroBadgeClip">
      <rect x="290" y="40" width="200" height="300" rx="10"/>
    </clipPath>
  </defs>

  <!-- Lanyard clip above the badge -->
  <rect x="380" y="30" width="20" height="6" rx="1.5" class="clip-fill"/>

  <!-- Badge body -->
  <rect x="290" y="40" width="200" height="300" rx="10" class="badge-body"/>

  <!-- Header strip (clipped to badge) -->
  <rect x="290" y="40" width="200" height="38" class="badge-header" clip-path="url(#heroBadgeClip)"/>
  <image href="/images/posts/model-behavior/logos/claude.svg" x="302" y="50" width="22" height="22" preserveAspectRatio="xMidYMid meet"/>
  <text x="418" y="63" text-anchor="middle" class="brand-name">Anthropic</text>
  <line x1="290" y1="78" x2="490" y2="78" class="badge-divider"/>

  <!-- Main logo (big) -->
  <image href="/images/posts/model-behavior/logos/claude.svg" x="340" y="100" width="100" height="100" preserveAspectRatio="xMidYMid meet"/>

  <!-- Agent name + role -->
  <text x="390" y="230" text-anchor="middle" class="agent-name-big">Claude</text>
  <text x="390" y="254" text-anchor="middle" class="agent-role">Opus 4.7</text>

  <!-- Footer strip -->
  <rect x="290" y="302" width="200" height="38" class="badge-footer" clip-path="url(#heroBadgeClip)"/>
  <line x1="290" y1="302" x2="490" y2="302" class="badge-divider"/>
  <text x="390" y="325" text-anchor="middle" class="badge-status">AUTHORIZED</text>

  <!-- "HELLO my name is GEMINI" sticker tilted across the middle -->
  <g transform="rotate(-7 390 195)">
    <rect x="303" y="143" width="180" height="108" rx="5" class="mini-tag-shadow"/>
    <rect x="300" y="140" width="180" height="108" rx="5" class="mini-tag-body"/>
    <path d="M 305 140 L 475 140 A 5 5 0 0 1 480 145 L 480 170 L 300 170 L 300 145 A 5 5 0 0 1 305 140 Z" class="mini-tag-strip"/>
    <text x="390" y="160" text-anchor="middle" class="mini-tag-hello">HELLO my name is</text>
    <text x="390" y="222" text-anchor="middle" class="mini-tag-name">GEMINI</text>
  </g>
</svg>
