<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif">
  <style>
    .badge-body { fill: #FAF8F5; stroke: #1B2A4A; stroke-width: 1.5; }
    .badge-body-ghost { fill: none; stroke: #1B2A4A; stroke-width: 1.2; stroke-dasharray: 4 3; opacity: 0.5; }
    .badge-header { fill: rgba(27, 42, 74, 0.08); }
    .badge-footer { fill: rgba(27, 42, 74, 0.04); }
    .badge-divider { stroke: #E8E4DF; stroke-width: 1; }
    .clip-fill { fill: #8A8A8A; }

    .brand-name { font-size: 9.5px; font-weight: 700; fill: #1A1A1A; letter-spacing: 0.18em; font-family: 'JetBrains Mono', 'SF Mono', monospace; text-transform: uppercase; }
    .brand-name-ghost { font-size: 9.5px; font-weight: 700; fill: #8A8A8A; letter-spacing: 0.18em; font-family: 'JetBrains Mono', 'SF Mono', monospace; text-transform: uppercase; opacity: 0.55; }
    .agent-name-big { font-size: 22px; font-weight: 800; fill: #1A1A1A; letter-spacing: 0.01em; }
    .agent-name-big-ghost { font-size: 22px; font-weight: 800; fill: #8A8A8A; letter-spacing: 0.01em; opacity: 0.55; }
    .agent-role { font-size: 11.5px; fill: #5C5C5C; letter-spacing: 0.08em; font-family: 'JetBrains Mono', 'SF Mono', monospace; text-transform: uppercase; }
    .agent-role-ghost { font-size: 11.5px; fill: #8A8A8A; letter-spacing: 0.08em; font-family: 'JetBrains Mono', 'SF Mono', monospace; text-transform: uppercase; opacity: 0.55; }

    .badge-status { font-size: 10px; fill: #5C5C5C; letter-spacing: 0.1em; font-family: 'JetBrains Mono', 'SF Mono', monospace; text-transform: uppercase; }
    .badge-status-ghost { font-size: 10px; fill: #8A8A8A; letter-spacing: 0.1em; font-family: 'JetBrains Mono', 'SF Mono', monospace; text-transform: uppercase; opacity: 0.55; }

    .lane-label { font-size: 14px; font-weight: 700; fill: #1A1A1A; }
    .lane-caption { font-size: 11.5px; fill: #5C5C5C; font-style: italic; }
    .lane-label-ghost { font-size: 14px; font-weight: 700; fill: #8A8A8A; }
    .lane-caption-ghost { font-size: 11.5px; fill: #8A8A8A; font-style: italic; }

    .mini-tag-body { fill: #FAF8F5; stroke: #1B2A4A; stroke-width: 1; }
    .mini-tag-strip { fill: #D8232A; }
    .mini-tag-hello { font-size: 7.5px; font-weight: 800; fill: #FFFFFF; letter-spacing: 0.12em; font-family: 'DM Sans', Arial, sans-serif; }
    .mini-tag-name { font-size: 22px; font-weight: 800; fill: #1A1A1A; letter-spacing: 0.02em; }
    .mini-tag-shadow { fill: rgba(27, 42, 74, 0.18); }

    .logo-codex { opacity: 0.45; }

    .header { font-size: 11px; font-weight: 500; fill: #8A8A8A; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    .annotation { font-size: 11px; fill: #8A8A8A; font-style: italic; }

    [data-theme="terminal"] .badge-body { fill: #0D1812; stroke: #3CEC6A; }
    [data-theme="terminal"] .badge-body-ghost { stroke: #5A7A5A; }
    [data-theme="terminal"] .badge-header { fill: rgba(60, 236, 106, 0.1); }
    [data-theme="terminal"] .badge-footer { fill: rgba(60, 236, 106, 0.05); }
    [data-theme="terminal"] .badge-divider { stroke: #1C2E24; }
    [data-theme="terminal"] .brand-name { fill: #D4E4D4; }
    [data-theme="terminal"] .brand-name-ghost { fill: #5A7A5A; }
    [data-theme="terminal"] .agent-name-big { fill: #D4E4D4; }
    [data-theme="terminal"] .agent-name-big-ghost { fill: #5A7A5A; }
    [data-theme="terminal"] .agent-role { fill: #8FA88F; }
    [data-theme="terminal"] .agent-role-ghost { fill: #5A7A5A; }
    [data-theme="terminal"] .badge-status { fill: #8FA88F; }
    [data-theme="terminal"] .badge-status-ghost { fill: #5A7A5A; }
    [data-theme="terminal"] .lane-label { fill: #D4E4D4; }
    [data-theme="terminal"] .lane-caption { fill: #8FA88F; }
    [data-theme="terminal"] .lane-label-ghost { fill: #5A7A5A; }
    [data-theme="terminal"] .lane-caption-ghost { fill: #5A7A5A; }
    [data-theme="terminal"] .mini-tag-body { fill: #0D1812; stroke: #3CEC6A; }
    [data-theme="terminal"] .mini-tag-strip { fill: #E8382E; }
    [data-theme="terminal"] .mini-tag-name { fill: #D4E4D4; }
    [data-theme="terminal"] .mini-tag-shadow { fill: rgba(0, 0, 0, 0.4); }
    [data-theme="terminal"] .logo-codex { filter: invert(1); opacity: 0.55; }
    [data-theme="terminal"] .header { fill: #5A7A5A; }
    [data-theme="terminal"] .annotation { fill: #5A7A5A; }
  </style>

  <defs>
    <clipPath id="badgeClip1">
      <rect x="80" y="46" width="140" height="220" rx="8"/>
    </clipPath>
    <clipPath id="badgeClip2">
      <rect x="320" y="46" width="140" height="220" rx="8"/>
    </clipPath>
    <clipPath id="badgeClip3">
      <rect x="560" y="46" width="140" height="220" rx="8"/>
    </clipPath>
  </defs>

  <!-- Top header -->
  <text x="390" y="22" text-anchor="middle" class="header">The Actual Cast  ·  v1.3.0 Review</text>

  <!-- =============== LANE 1: GEMINI =============== -->
  <rect x="142" y="38" width="16" height="4" rx="1" class="clip-fill"/>

  <rect x="80" y="46" width="140" height="220" rx="8" class="badge-body"/>
  <rect x="80" y="46" width="140" height="28" class="badge-header" clip-path="url(#badgeClip1)"/>
  <image href="/images/posts/model-behavior/logos/gemini.svg" x="88" y="52" width="18" height="18" preserveAspectRatio="xMidYMid meet"/>
  <text x="172" y="64" text-anchor="middle" class="brand-name">Google</text>
  <line x1="80" y1="74" x2="220" y2="74" class="badge-divider"/>

  <image href="/images/posts/model-behavior/logos/gemini.svg" x="115" y="88" width="70" height="70" preserveAspectRatio="xMidYMid meet"/>

  <text x="150" y="188" text-anchor="middle" class="agent-name-big">Gemini</text>
  <text x="150" y="208" text-anchor="middle" class="agent-role">CLI · v2.5</text>

  <rect x="80" y="238" width="140" height="28" class="badge-footer" clip-path="url(#badgeClip1)"/>
  <line x1="80" y1="238" x2="220" y2="238" class="badge-divider"/>
  <text x="150" y="256" text-anchor="middle" class="badge-status">ON PATH · IDLE</text>

  <text x="150" y="300" text-anchor="middle" class="lane-label">Gemini CLI</text>
  <text x="150" y="320" text-anchor="middle" class="lane-caption">real tool · never called</text>

  <!-- =============== LANE 2: CLAUDE (with nametag overlay) =============== -->
  <rect x="382" y="38" width="16" height="4" rx="1" class="clip-fill"/>

  <rect x="320" y="46" width="140" height="220" rx="8" class="badge-body"/>
  <rect x="320" y="46" width="140" height="28" class="badge-header" clip-path="url(#badgeClip2)"/>
  <image href="/images/posts/model-behavior/logos/claude.svg" x="328" y="52" width="18" height="18" preserveAspectRatio="xMidYMid meet"/>
  <text x="410" y="64" text-anchor="middle" class="brand-name">Anthropic</text>
  <line x1="320" y1="74" x2="460" y2="74" class="badge-divider"/>

  <image href="/images/posts/model-behavior/logos/claude.svg" x="355" y="88" width="70" height="70" preserveAspectRatio="xMidYMid meet"/>

  <text x="390" y="188" text-anchor="middle" class="agent-name-big">Claude</text>
  <text x="390" y="208" text-anchor="middle" class="agent-role">Opus 4.7</text>

  <rect x="320" y="238" width="140" height="28" class="badge-footer" clip-path="url(#badgeClip2)"/>
  <line x1="320" y1="238" x2="460" y2="238" class="badge-divider"/>
  <text x="390" y="256" text-anchor="middle" class="badge-status">AUTHORIZED</text>

  <!-- nametag sticker overlay, tilted, covering mid-badge -->
  <g transform="rotate(-7 390 175)">
    <rect x="328" y="141" width="128" height="74" rx="4" class="mini-tag-shadow"/>
    <rect x="326" y="138" width="128" height="74" rx="4" class="mini-tag-body"/>
    <path d="M 330 138 L 450 138 A 4 4 0 0 1 454 142 L 454 160 L 326 160 L 326 142 A 4 4 0 0 1 330 138 Z" class="mini-tag-strip"/>
    <text x="390" y="154" text-anchor="middle" class="mini-tag-hello">HELLO my name is</text>
    <text x="390" y="195" text-anchor="middle" class="mini-tag-name">GEMINI</text>
  </g>

  <text x="390" y="300" text-anchor="middle" class="lane-label">Claude</text>
  <text x="390" y="320" text-anchor="middle" class="lane-caption">same badge, different sticker</text>

  <!-- =============== LANE 3: CODEX (absent / ghost) =============== -->
  <rect x="622" y="38" width="16" height="4" rx="1" class="clip-fill" opacity="0.5"/>

  <rect x="560" y="46" width="140" height="220" rx="8" class="badge-body-ghost"/>
  <image href="/images/posts/model-behavior/logos/openai.svg" x="568" y="52" width="18" height="18" preserveAspectRatio="xMidYMid meet" class="logo-codex"/>
  <text x="650" y="64" text-anchor="middle" class="brand-name-ghost">OpenAI</text>
  <line x1="560" y1="74" x2="700" y2="74" class="badge-divider" stroke-dasharray="3 3" opacity="0.5"/>

  <image href="/images/posts/model-behavior/logos/openai.svg" x="595" y="88" width="70" height="70" preserveAspectRatio="xMidYMid meet" class="logo-codex"/>

  <text x="630" y="188" text-anchor="middle" class="agent-name-big-ghost">Codex</text>
  <text x="630" y="208" text-anchor="middle" class="agent-role-ghost">— — —</text>

  <line x1="560" y1="238" x2="700" y2="238" class="badge-divider" stroke-dasharray="3 3" opacity="0.5"/>
  <text x="630" y="256" text-anchor="middle" class="badge-status-ghost">NOT ISSUED</text>

  <text x="630" y="300" text-anchor="middle" class="lane-label-ghost">Codex</text>
  <text x="630" y="320" text-anchor="middle" class="lane-caption-ghost">never showed up</text>

  <!-- Footer annotation -->
  <text x="390" y="358" text-anchor="middle" class="annotation">The real Gemini was right there. Claude showed up anyway, wearing its name.</text>

</svg>
